<html>
<head>
    <title>RPG</title>
    <meta charset="UTF-8">
    <script src=https://code.jquery.com/jquery-3.6.0.min.js></script>
    <link href="/css/my.css" rel="stylesheet">
</head>
<body>
    <h1>RPG admin panel</h1>

    <div class="dropdown-list">
        <label for="counter-per-page"> Count per page</label>
        <select id="counter-per-page">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
        </select>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Title</th>
                <th>Race</th>
                <th>Profession</th>
                <th>Level</th>
                <th>Birthday</th>
                <th>Banned</th>
                <th>Edit</th>
                <th>Delete</th>

            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="pagination">
        <label>Pages:</label>
    </div>

    <script>
        // load scripts
        document.addEventListener('DOMContentLoaded', () => {
            //Наполняем Select
            createSelectList()
            showAccounts();

            let counterPerPage = document.getElementById("counter-per-page");
            if (counterPerPage) {
                counterPerPage.addEventListener("change", (e)=>{
                    showAccounts(0);
                });
            }

            document.getElementById("pagination").addEventListener("click", (e) => {
                let btn = e.target.closest('.btn');

                if (btn && btn.parentElement.id === 'pagination') {
                    let numberPage = parseInt(btn.id.replace("page_",""));
                    // console.log("Number page", numberPage);
                    showAccounts(numberPage);
                }
            });

            document.addEventListener('click', (event) => {
               const btn = event.target.closest('[id^="btn_delete_"], [id^="btn_edit_"]');

               if (!btn) return;
               event.preventDefault();

               if (btn.id.startsWith('btn_delete_')) {
                   let btnId = btn.id.replace('btn_delete_','');
                   deleteAccount(btnId);
               }

                if (btn.id.startsWith('btn_edit_')) {
                    let btnId = btn.id.replace('btn_edit_','');
                    // Скрытие кнопки Delete
                    // document.getElementById('btn_delete_' + btnId).classList.add('hidden');
                    //
                    // const selector = '#btn_edit_' + btnId + ' img';
                    // if (document.querySelector(selector)) {
                    //     document.querySelector(selector).src = '/img/save.png';
                    // }

                    editSaveAccount(btn);
                }
            });

        });

        // usefully scripts
        function getTotalCount() {
            let url = "/rest/players/count";
            let result = 0;
            $.ajax({
                url: url,
                async: false,
                success: function (data) {
                    result = parseInt(data);
                }
            })
            return result;
        }

        function createSelectList() {
            const select = document.getElementById('counter-per-page');

            if (!select) return;

            select.innerHTML = '';

            for (let i = 3; i <= 20; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                select.appendChild(option);
            }

            select.value = '5';
        }

        function getCountPerPage() {
            let counter = document.getElementById("counter-per-page");

            if (!counter) {
                // return parseInt(counter.options[0].value);
                return 5;
            }

            let selectedIdx = counter.selectedIndex;
            return parseInt(counter.options[selectedIdx].value);
        }

        function getCurrentPage() {
            let stringCurrentPage = $('#pagination .btn.active').attr("id");
            stringCurrentPage = stringCurrentPage.replace('page_','');
            return parseInt(stringCurrentPage);
        }

        // Списки значений полей
        const selectConfigs = {
            race: ['HUMAN', 'DWARF', 'ELF', 'GIANT', 'ORC', 'TROLL', 'HOBBIT'],
            profession: ['WARRIOR', 'ROGUE', 'SORCERER', 'CLERIC', 'PALADIN', 'NAZGUL', 'WARLOCK', 'DRUID'],
            banned: ['false', 'true']
        };

        function createSelectHTML(field, idAccount, currentValue) {
            const options = selectConfigs[field];
            if (!options) return '';

            const selectId = 'select_' + field + '_' + idAccount;
            const current = String(currentValue).toUpperCase();

            let html = '';
            for (let option of options) {
                if (String(option) === current) {
                    html += '<option value=' + option + ' selected>' + option + '</option>';
                } else {
                    html += '<option value=' + option + '>' + option + '</option>';
                }
            }

            return '<select id=' + selectId + ' name=' + field + 'data-field=' + field + ' class="inline-edit-input">' + html + '</select>';
        }

        function enableInlineEditing(row, idAccount) {
            const fieldTypes = {
                name: 'text',
                title: 'text',
                race: 'select',
                profession: 'select',
                banned: 'select',
            };

            for (let entry of Object.entries(fieldTypes)) {
                let field = entry[0];
                let type = entry[1];

                const cell = row.querySelector('td[data-field="' + field + '"]');
                if (!cell) continue;

                const currentVal = cell.textContent.trim();

                if (type === 'select') {
                    cell.innerHTML = createSelectHTML(field, idAccount, currentVal);
                } else {
                    const input = document.createElement('input');
                    input.type = type;
                    input.value = currentVal;
                    input.classList.add('inline-edit-input');
                    input.dataset.field = field;
                    cell.textContent = '';
                    cell.appendChild(input);
                }
            }
        }


        // Account scripts
        function showAccounts(page_number){
            $("tbody").remove();
            let url = "/rest/players";

            let totalCount = getTotalCount();
            let countPerPage = getCountPerPage();

            if (page_number == null) {
                page_number = 0;
            }

            url = url.concat("?").concat("pageSize=").concat(countPerPage);
            url = url.concat("&pageNumber=").concat(page_number);
            // console.log("url", url);

            $.get(url, function (response){
                const $tbody = $("<tbody>").appendTo("#main-table");
                $.each(response, function(idx, item) {
                    // Object { id: 1, name: "Ниус", title: "Приходящий Без Шума", race: "HOBBIT", profession: "ROGUE", birthday: 1244497480000, banned: false, level: 33 }
                    $("<tr>").html("<td data-id=" + item.id + ">" + item.id + "</td>"
                        + "<td data-field='name'>" + item.name + "</td>"
                        + "<td data-field='title'>" + item.title + "</td>"
                        + "<td data-field='race'>" + item.race + "</td>"
                        + "<td data-field='profession'>" + item.profession + "</td>"
                        + "<td>" + item.level + "</td>"
                        + "<td>" + new Date(item.birthday).toLocaleDateString() + "</td>"
                        + "<td data-field='banned'>" + item.banned + "</td>"
                        + "<td><button id='btn_edit_" + item.id + "' class='btn'>" + "<img src='/img/edit.png' alt='Edit'>" + "</button></td>"
                        + "<td><button id='btn_delete_" + item.id + "' class='btn'>" + "<img src='/img/delete.png' alt='Delete'>" + "</button></td>"
                    ).appendTo($tbody);
                })
            });

            let pagesCount = Math.ceil(totalCount / countPerPage);
            $("#pagination .btn").remove();

            for (let i = 0; i < pagesCount; i++) {
                let tagButton = "<button>" + (i + 1) + "</button>";
                let newButton = $(tagButton).attr("id", "page_" + i).addClass("btn");
                $("#pagination").append(newButton);
            }

            let current_page = "#page_" + page_number;
            // console.log("Current page", current_page);
            $(current_page).addClass("active");

        }

        function deleteAccount(idAccount) {
            let url = "/rest/players/" + idAccount;
            $.ajax({
                url: url,
                type: "DELETE",
                success: () => {
                    showAccounts(getCurrentPage());
                },
                error: function(xhr, status, error) {
                    console.error('Ошибка удаления:', error);
                    alert('Не удалось удалить: ' + (xhr.responseJSON?.message || error));
                }
            });
        }

        function saveAccount(id, data, row) {
            const url = '/rest/players/' + id;
            console.log(data);
            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    for (let entry of Object.entries(data)) {
                        let field = entry[0];
                        let value = entry[1];

                        const cell = row.querySelector('td[data-field="' + field + '"]');

                        if (cell) {
                            if (field === 'banned') {
                                if (value === true || value === 'true') {
                                    cell.textContent = 'true';
                                } else {
                                    cell.textContent = 'false';
                                }
                            } else if (field !== 'id' && field !== 'birthday' && field !== 'level') {
                                cell.textContent = value;
                            } else if (field === 'birthday') {
                                cell.textContent = new Data(value).toLocaleString();
                            }
                        }
                    }
                },
                error: function(xhr) {
                    alert('Ошибка сохранения: ' + (xhr.responseJSON?.message || 'Неизвестная ошибка'));
                    // При ошибке можно вызвать editAccount(pressedBtn) снова, чтобы откатить изменения
                }
            });
        }

        function editSaveAccount(pressedBtn) {
            const row = pressedBtn.closest('tr');
            if (!row) return;

            const btnId = pressedBtn.id.replace('btn_edit_', '');
            let editingMode = 'editing-mode';
            const isEditing = pressedBtn.classList.contains(editingMode);

            if (!isEditing) {
                pressedBtn.classList.add(editingMode);

                const img = pressedBtn.querySelector('img');
                if (img) img.src = '/img/save.png';

                const btnDelete = document.getElementById('btn_delete_' + btnId);
                if (btnDelete) btnDelete.classList.add('hidden');

                enableInlineEditing(row, btnId);
            } else {
                pressedBtn.classList.remove(editingMode);
                const img = pressedBtn.querySelector('img');

                if (img) img.src = '/img/edit.png';

                const btnDelete = document.getElementById('btn_delete_' + btnId);
                if (btnDelete) btnDelete.classList.remove('hidden');

                const updatedData = {};
                row.querySelectorAll('[data-field]').forEach(elem => {
                    const field = elem.dataset.field;

                    if (elem.tagName === 'SELECT') {
                        updatedData[field] = elem.value;
                    } else if (elem.tagName === 'INPUT') {
                        updatedData[field] = elem.value;
                    }
                });

                saveAccount(btnId, updatedData, row);
            }
        }


    </script>
</body>
</html>
