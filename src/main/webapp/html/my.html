<html>
<head>
    <meta charset="UTF-8">
    <title>RPG</title>
    <script src=https://code.jquery.com/jquery-3.6.0.min.js></script>
    <link href="/css/my.css" rel="stylesheet">
</head>
<body>
    <h1>RPG admin panel</h1>

    <div class="dropdown-list">
        <label for="counter-per-page"> Count per page</label>
        <select id="counter-per-page">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
        </select>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Title</th>
                <th>Race</th>
                <th>Profession</th>
                <th>Level</th>
                <th>Birthday</th>
                <th>Banned</th>
                <th>Edit</th>
                <th>Delete</th>

            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="pagination">
        <label>Pages:</label>
    </div>

    <div id="create-form-container" style="margin-top: 1em; padding-top: 1em; border-top: 2px solid gray;">
        <h3>Create new account:</h3>
        <div class="create-form">
            <div class="form-field">
                <label for="create-name">Name*</label>
                <input type="text" id="create-name" class="inline-edit-input" placeholder="1-12 symbols" maxlength="12" required>
            </div>

            <div class="form-field">
                <label for="create-title">Title*</label>
                <input type="text" id="create-title" class="inline-edit-input" placeholder="1-30 symbols" maxlength="30" required>
            </div>

            <div class="form-field">
                <label for="create-race">Race*</label>
                <select id="create-race" class="inline-edit-input" required>
                    <option value="HUMAN">HUMAN</option>
                    <option value="DWARF">DWARF</option>
                    <option value="ELF">ELF</option>
                    <option value="GIANT">GIANT</option>
                    <option value="ORC">ORC</option>
                    <option value="TROLL">TROLL</option>
                    <option value="HOBBIT">HOBBIT</option>
                </select>
            </div>

            <div class="form-field">
                <label for="create-profession">Profession*</label>
                <select id="create-profession" class="inline-edit-input" required>
                    <option value="WARRIOR">WARRIOR</option>
                    <option value="ROGUE">ROGUE</option>
                    <option value="SORCERER">SORCERER</option>
                    <option value="CLERIC">CLERIC</option>
                    <option value="PALADIN">PALADIN</option>
                    <option value="NAZGUL">NAZGUL</option>
                    <option value="WARLOCK">WARLOCK</option>
                    <option value="DRUID">DRUID</option>
                </select>
            </div>

            <div class="form-field">
                <label for="create-level">Level*</label>
                <input type="number" id="create-level" class="inline-edit-input" min="0" max="100" value="1" required>
            </div>

            <div class="form-field">
                <label for="create-birthday">Birthday*</label>
                <input type="date" id="create-birthday" class="inline-edit-input" min="1970-01-02" required>
            </div>

            <div class="form-field">
                <label for="create-banned">Banned</label>
                <select id="create-banned" class="inline-edit-input">
                    <option value="false">false</option>
                    <option value="true">true</option>
                </select>
            </div>
        </div>

        <div id="create-message" style="margin-top: 0.5em; font-size: 0.9em;"></div>
        <br><br>
        <button id="btn-create-account" class="btn" style="margin-top: 1em;">
            Create account
        </button>
    </div>


    <script>
        // Загрузка всех скриптов
        document.addEventListener('DOMContentLoaded', () => {
            //Наполняем Select
            createSelectList()
            showAccounts();

            let counterPerPage = document.getElementById("counter-per-page");
            if (counterPerPage) {
                counterPerPage.addEventListener("change", ()=>{
                    showAccounts(0);
                });
            }

            document.getElementById("pagination").addEventListener("click", (e) => {
                let btn = e.target.closest('.btn');

                if (btn && btn.parentElement.id === 'pagination') {
                    let numberPage = parseInt(btn.id.replace("page_",""));
                    // console.log("Number page", numberPage);
                    showAccounts(numberPage);
                }
            });

            document.addEventListener('click', (event) => {
               const btn = event.target.closest('[id^="btn_delete_"], [id^="btn_edit_"]');

               if (!btn) return;
               event.preventDefault();

               if (btn.id.startsWith('btn_delete_')) {
                   let btnId = btn.id.replace('btn_delete_','');
                   deleteAccount(btnId);
               }

                if (btn.id.startsWith('btn_edit_')) {

                    editSaveAccount(btn);
                }
            });

            document.getElementById('btn-create-account').addEventListener('click', createAccount);
        });

        // Получение количества игрроков
        function getTotalCount() {
            let url = "/rest/players/count";
            let result = 0;
            $.ajax({
                url: url,
                async: false,
                success: function (data) {
                    result = parseInt(data);
                }
            })
            return result;
        }

        // Создание списка поля "Количество записей на страницу"
        function createSelectList() {
            const select = document.getElementById('counter-per-page');

            if (!select) return;

            select.innerHTML = '';

            for (let i = 3; i <= 20; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                select.appendChild(option);
            }

            select.value = '5';
        }

        // Получение значения из поля "Количество записей на страницу"
        function getCountPerPage() {
            let counter = document.getElementById("counter-per-page");

            if (!counter) {
                // return parseInt(counter.options[0].value);
                return 5;
            }

            let selectedIdx = counter.selectedIndex;
            return parseInt(counter.options[selectedIdx].value);
        }

        // Получение активной текущей страницы
        function getCurrentPage() {
            let stringCurrentPage = $('#pagination .btn.active').attr("id");
            stringCurrentPage = stringCurrentPage.replace('page_','');
            return parseInt(stringCurrentPage);
        }

        // Списки значений полей (select)
        const selectConfigs = {
            race: ['HUMAN', 'DWARF', 'ELF', 'GIANT', 'ORC', 'TROLL', 'HOBBIT'],
            profession: ['WARRIOR', 'ROGUE', 'SORCERER', 'CLERIC', 'PALADIN', 'NAZGUL', 'WARLOCK', 'DRUID'],
            banned: ['false', 'true']
        };

        // Создание элемента от типа поля (text, select)
        function createSelectHTML(field, idAccount, currentValue) {
            const options = selectConfigs[field];
            if (!options) return '';

            const selectId = 'select_' + field + '_' + idAccount;
            const current = String(currentValue).toUpperCase();

            let html = '';
            for (let option of options) {
                if (String(option) === current) {
                    html += '<option value=' + option + ' selected>' + option + '</option>';
                } else {
                    html += '<option value=' + option + '>' + option + '</option>';
                }
            }

            return '<select id=' + selectId + ' name=' + field + 'data-field=' + field + ' class="inline-edit-input">' + html + '</select>';
        }

        // Доступность поля для внесения изменения
        function enableInlineEditing(row, idAccount) {
            const fieldTypes = {
                name: 'text',
                title: 'text',
                race: 'select',
                profession: 'select',
                banned: 'select',
            };

            for (let entry of Object.entries(fieldTypes)) {
                let field = entry[0];
                let type = entry[1];

                const cell = row.querySelector('td[data-field="' + field + '"]');
                if (!cell) continue;

                const currentVal = cell.textContent.trim();

                if (type === 'select') {
                    cell.innerHTML = createSelectHTML(field, idAccount, currentVal);
                } else {
                    const input = document.createElement('input');
                    input.type = type;
                    input.value = currentVal;
                    input.classList.add('inline-edit-input');
                    input.dataset.field = field;
                    cell.textContent = '';
                    cell.appendChild(input);
                }
            }
        }


        // Account scripts
        // Показать таблицу
        function showAccounts(page_number){
            $("tbody").remove();
            let url = "/rest/players";

            let totalCount = getTotalCount();
            let countPerPage = getCountPerPage();

            if (page_number == null) {
                page_number = 0;
            }

            url = url.concat("?").concat("pageSize=").concat(countPerPage);
            url = url.concat("&pageNumber=").concat(page_number);
            // console.log("url", url);

            $.get(url, function (response){
                const $tbody = $("<tbody>").appendTo("#main-table");
                $.each(response, function(idx, item) {
                    // Object { id: 1, name: "Ниус", title: "Приходящий Без Шума", race: "HOBBIT", profession: "ROGUE", birthday: 1244497480000, banned: false, level: 33 }
                    $("<tr>").html("<td data-id=" + item.id + ">" + item.id + "</td>"
                        + "<td data-field='name'>" + item.name + "</td>"
                        + "<td data-field='title'>" + item.title + "</td>"
                        + "<td data-field='race'>" + item.race + "</td>"
                        + "<td data-field='profession'>" + item.profession + "</td>"
                        + "<td>" + item.level + "</td>"
                        + "<td>" + new Date(item.birthday).toLocaleDateString() + "</td>"
                        + "<td data-field='banned'>" + item.banned + "</td>"
                        + "<td><button id='btn_edit_" + item.id + "' class='btn'>" + "<img src='/img/edit.png' alt='Edit'>" + "</button></td>"
                        + "<td><button id='btn_delete_" + item.id + "' class='btn'>" + "<img src='/img/delete.png' alt='Delete'>" + "</button></td>"
                    ).appendTo($tbody);
                })
            });

            let pagesCount = Math.ceil(totalCount / countPerPage);
            $("#pagination .btn").remove();

            for (let i = 0; i < pagesCount; i++) {
                let tagButton = "<button>" + (i + 1) + "</button>";
                let newButton = $(tagButton).attr("id", "page_" + i).addClass("btn");
                $("#pagination").append(newButton);
            }

            let current_page = "#page_" + page_number;
            // console.log("Current page", current_page);
            $(current_page).addClass("active");

        }

        // Удалить запись
        function deleteAccount(idAccount) {
            let url = "/rest/players/" + idAccount;
            $.ajax({
                url: url,
                type: "DELETE",
                success: () => {
                    showAccounts(getCurrentPage());
                },
                error: function(xhr, status, error) {
                    console.error('Ошибка удаления:', error);
                    alert('Не удалось удалить: ' + (xhr.responseJSON?.message || error));
                }
            });
        }

        // Сохранить редактируемую запись
        function saveAccount(id, data, row) {
            const url = '/rest/players/' + id;
            console.log(data);
            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    for (let entry of Object.entries(data)) {
                        let field = entry[0];
                        let value = entry[1];

                        const cell = row.querySelector('td[data-field="' + field + '"]');

                        if (cell) {
                            if (field === 'banned') {
                                if (value === true || value === 'true') {
                                    cell.textContent = 'true';
                                } else {
                                    cell.textContent = 'false';
                                }
                            } else if (field !== 'id' && field !== 'birthday' && field !== 'level') {
                                cell.textContent = value;
                            } else if (field === 'birthday') {
                                cell.textContent = new Data(value).toLocaleString();
                            }
                        }
                    }
                },
                error: function(xhr) {
                    alert('Ошибка сохранения: ' + (xhr.responseJSON?.message || 'Неизвестная ошибка'));
                    // При ошибке можно вызвать editAccount(pressedBtn) снова, чтобы откатить изменения
                }
            });
        }

        // Нажатие кнопки Edit или Save
        function editSaveAccount(pressedBtn) {
            const row = pressedBtn.closest('tr');
            if (!row) return;

            const btnId = pressedBtn.id.replace('btn_edit_', '');
            let editingMode = 'editing-mode';
            const isEditing = pressedBtn.classList.contains(editingMode);

            if (!isEditing) {
                pressedBtn.classList.add(editingMode);

                const img = pressedBtn.querySelector('img');
                if (img) img.src = '/img/save.png';

                const btnDelete = document.getElementById('btn_delete_' + btnId);
                if (btnDelete) btnDelete.classList.add('hidden');

                enableInlineEditing(row, btnId);
            } else {
                pressedBtn.classList.remove(editingMode);
                const img = pressedBtn.querySelector('img');

                if (img) img.src = '/img/edit.png';

                const btnDelete = document.getElementById('btn_delete_' + btnId);
                if (btnDelete) btnDelete.classList.remove('hidden');

                const updatedData = {};
                row.querySelectorAll('[data-field]').forEach(elem => {
                    const field = elem.dataset.field;

                    if (elem.tagName === 'SELECT') {
                        updatedData[field] = elem.value;
                    } else if (elem.tagName === 'INPUT') {
                        updatedData[field] = elem.value;
                    }
                });

                saveAccount(btnId, updatedData, row);
            }
        }

        function createAccount() {

            const messageEl = document.getElementById('create-message');
            messageEl.textContent = '';
            messageEl.className = '';

            const formData = {
                name: document.getElementById('create-name').value.trim(),
                title: document.getElementById('create-title').value.trim(),
                race: document.getElementById('create-race').value.trim(),
                profession: document.getElementById('create-profession').value.trim(),
                level: document.getElementById('create-level').value.trim(),
                birthday: document.getElementById('create-birthday').value.trim(),
                banned: document.getElementById('create-banned').value.trim(),
            };

            const errors = [];

            if (!formData.name || formData.name.length < 1 || formData.name.length > 12) {
                errors.push('Name from 1 to 12 symbols.');
            }

            if (!formData.title || formData.name.title < 1 || formData.name.title > 30) {
                errors.push('Title from 1 to 30 symbols.');
            }

            if (!formData.race) errors.push('Choose Race.');
            if (!formData.profession) errors.push('Choose Profession.');

            if (isNaN(formData.level) || formData.level < 0 || formData.level > 100) {
                errors.push('Level from 1 to 100.');
            }

            const birthdayInput = document.getElementById('create-birthday').value;
            let birthdayTimestamp = 0;
            if (!formData.birthday) {
                errors.push('Choose Birthday.');
            } else {
                birthdayTimestamp = new Date(birthdayInput).getTime();
                if (isNaN(birthdayTimestamp) || birthdayTimestamp < 0) {
                    errors.push('Birthday: Date must be after 01.01.1970');
                }
                formData.birthday = birthdayTimestamp;
            }

            if (errors.length > 0) {
                messageEl.innerHTML = 'ERRORS: <ul class="error-list">' + errors.map(elem => '<li>' + elem + '</li>').join('') + '</ul>';
                messageEl.className = 'error';
                return;
            }

            const btnCreateAccount = document.getElementById('btn-create-account');
            btnCreateAccount.disabled = true;

            const url = '/rest/players';
            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function(response) {
                    clearCreateForm();
                    messageEl.innerHTML = 'Account ' + response.name + ' created!';
                    messageEl.className = 'success';

                    setTimeout(() => {
                        messageEl.innerHTML = '';
                        messageEl.className = '';
                    }, 3000);

                    showAccounts(getCurrentPage());
                    btnCreateAccount.disabled = false;
                },
                error: function(xhr) {
                    console.error('Error of creation:', xhr.status, xhr.responseText);

                    if (xhr.status === 400) {
                        messageEl.textContent = 'Error 400: Not valid data. Check fields.';
                    } else if (xhr.status === 409) {
                        messageEl.textContent = 'Error 409: Account.';
                    } else {
                        messageEl.textContent = 'Error: ' + (xhr.status || 'Unknown error.');
                    }
                    messageEl.className = 'error';
                }
            })

        }

        function clearCreateForm() {
            document.getElementById('create-name').value = '';
            document.getElementById('create-title').value = '';
            document.getElementById('create-race').value = '';
            document.getElementById('create-profession').value = '';
            document.getElementById('create-level').value = '1';
            document.getElementById('create-birthday').value = '';
            document.getElementById('create-banned').value = 'false';
        }


    </script>
</body>
</html>
